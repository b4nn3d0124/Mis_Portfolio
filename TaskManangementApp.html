<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow — Task Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --bg-raised: #1a1a18;
    --bg-card: #222220;
    --fg: #f0ece4;
    --fg-muted: #8a8778;
    --accent: #e8a634;
    --accent-hover: #f0b84a;
    --accent-glow: rgba(232,166,52,0.15);
    --border: #2e2e2a;
    --danger: #e05252;
    --success: #4ade80;
    --info: #60b5e8;
    --urgent: #ff6b6b;
    --high: #e8a634;
    --medium: #60b5e8;
    --low: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    height: 100vh;
  }

  h1, h2, h3, h4, h5 { font-family: 'Space Grotesk', sans-serif; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  .bg-noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  .glow-orb {
    position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
  }

  .sidebar-item {
    transition: all 0.2s ease;
    position: relative;
  }
  .sidebar-item::before {
    content: '';
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 0; background: var(--accent);
    border-radius: 0 4px 4px 0; transition: height 0.2s ease;
  }
  .sidebar-item:hover, .sidebar-item.active {
    background: var(--accent-glow);
    color: var(--accent);
  }
  .sidebar-item:hover::before, .sidebar-item.active::before {
    height: 60%;
  }

  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: grab;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--border); transition: background 0.2s;
  }
  .task-card[data-priority="urgent"]::before { background: var(--urgent); }
  .task-card[data-priority="high"]::before { background: var(--high); }
  .task-card[data-priority="medium"]::before { background: var(--medium); }
  .task-card[data-priority="low"]::before { background: var(--low); }

  .task-card:hover {
    border-color: rgba(232,166,52,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .task-card.dragging {
    opacity: 0.5;
    transform: rotate(2deg) scale(1.02);
  }

  .kanban-column {
    min-height: 200px;
    transition: background 0.2s;
    border-radius: 12px;
  }
  .kanban-column.drag-over {
    background: rgba(232,166,52,0.05);
    outline: 2px dashed rgba(232,166,52,0.3);
    outline-offset: -2px;
  }

  .modal-overlay {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    transition: opacity 0.25s ease;
  }
  .modal-content {
    animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .toast {
    animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(100px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .toast.out {
    animation: toastOut 0.3s ease forwards;
  }
  @keyframes toastOut {
    to { opacity: 0; transform: translateX(100px); }
  }

  .priority-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 6px;
  }
  .priority-urgent { background: rgba(255,107,107,0.15); color: var(--urgent); }
  .priority-high { background: rgba(232,166,52,0.15); color: var(--high); }
  .priority-medium { background: rgba(96,181,232,0.15); color: var(--medium); }
  .priority-low { background: rgba(74,222,128,0.15); color: var(--low); }

  .category-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .cat-work { background: #e8a634; }
  .cat-personal { background: #a78bfa; }
  .cat-design { background: #f472b6; }
  .cat-development { background: #60b5e8; }
  .cat-marketing { background: #4ade80; }

  input, select, textarea {
    background: var(--bg) !important;
    border: 1px solid var(--border) !important;
    color: var(--fg) !important;
    border-radius: 8px !important;
    padding: 10px 14px !important;
    font-family: 'DM Sans', sans-serif !important;
    font-size: 14px !important;
    transition: border-color 0.2s !important;
    outline: none !important;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px var(--accent-glow) !important;
  }
  select option { background: var(--bg-raised); color: var(--fg); }

  .btn-primary {
    background: var(--accent); color: var(--bg); font-weight: 600;
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif; font-size: 14px;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,166,52,0.3); }

  .btn-ghost {
    background: transparent; color: var(--fg-muted); font-weight: 500;
    padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; font-size: 14px;
  }
  .btn-ghost:hover { border-color: var(--fg-muted); color: var(--fg); }

  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; transition: all 0.25s;
  }
  .stat-card:hover { border-color: rgba(232,166,52,0.25); transform: translateY(-2px); }

  .progress-bar {
    height: 6px; background: var(--border); border-radius: 6px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    background: linear-gradient(90deg, var(--accent), var(--accent-hover));
  }

  .view-toggle-btn {
    padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer;
    background: transparent; color: var(--fg-muted); transition: all 0.2s;
  }
  .view-toggle-btn.active { background: var(--accent-glow); color: var(--accent); }

  .filter-chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--fg-muted);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--fg-muted); }
  .filter-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  .list-task {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    transition: all 0.2s; cursor: grab;
  }
  .list-task:hover { border-color: rgba(232,166,52,0.3); transform: translateX(4px); }
  .list-task.dragging { opacity: 0.5; }

  .custom-checkbox {
    width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .custom-checkbox:hover { border-color: var(--accent); }
  .custom-checkbox.checked {
    background: var(--accent); border-color: var(--accent);
  }
  .custom-checkbox.checked i { display: block; }
  .custom-checkbox i { display: none; font-size: 11px; color: var(--bg); }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--fg-muted);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  .float-anim { animation: float 6s ease-in-out infinite; }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(232,166,52,0.3); }
    70% { box-shadow: 0 0 0 8px rgba(232,166,52,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,166,52,0); }
  }

  @media (max-width: 768px) {
    .sidebar { display: none !important; }
    .main-content { margin-left: 0 !important; }
  }
</style>
</head>
<body>

<div class="bg-noise"></div>
<div class="glow-orb" style="width:500px;height:500px;background:rgba(232,166,52,0.04);top:-100px;right:-100px;"></div>
<div class="glow-orb" style="width:400px;height:400px;background:rgba(232,166,52,0.03);bottom:-80px;left:20%;"></div>

<!-- Toast Container -->
<div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;"></div>

<!-- Sidebar -->
<aside class="sidebar" style="position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg-raised);border-right:1px solid var(--border);z-index:50;display:flex;flex-direction:column;">
  <!-- Logo -->
  <div style="padding:24px 20px 20px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <i class="fa-solid fa-bolt" style="color:var(--bg);font-size:16px;"></i>
      </div>
      <div>
        <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.5px;">Taskflow</h1>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav style="padding:0 10px;flex:1;">
    <div style="padding:0 10px;margin-bottom:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg-muted);">Workspace</div>
    <div class="sidebar-item active" data-view="board" onclick="switchView('board')" style="padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:2px;font-size:14px;">
      <i class="fa-solid fa-columns" style="width:18px;text-align:center;"></i> Board
    </div>
    <div class="sidebar-item" data-view="list" onclick="switchView('list')" style="padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:2px;font-size:14px;color:var(--fg-muted);">
      <i class="fa-solid fa-list" style="width:18px;text-align:center;"></i> List
    </div>
    <div class="sidebar-item" data-view="stats" onclick="switchView('stats')" style="padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:2px;font-size:14px;color:var(--fg-muted);">
      <i class="fa-solid fa-chart-pie" style="width:18px;text-align:center;"></i> Statistics
    </div>

    <div style="padding:0 10px;margin:20px 0 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--fg-muted);">Categories</div>
    <div id="sidebarCategories"></div>
  </nav>

  <!-- Progress -->
  <div style="padding:20px;border-top:1px solid var(--border);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:12px;color:var(--fg-muted);">Overall Progress</span>
      <span id="progressPercent" style="font-size:12px;font-weight:600;color:var(--accent);">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%;"></div>
    </div>
    <div id="progressCount" style="font-size:11px;color:var(--fg-muted);margin-top:6px;">0 of 0 completed</div>
  </div>
</aside>

<!-- Main Content -->
<main class="main-content" style="margin-left:260px;height:100vh;overflow-y:auto;position:relative;z-index:1;">
  <!-- Top Bar -->
  <header style="position:sticky;top:0;z-index:40;background:rgba(17,17,16,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:16px;">
    <!-- Search -->
    <div style="position:relative;flex:1;max-width:400px;">
      <i class="fa-solid fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--fg-muted);font-size:13px;"></i>
      <input type="text" id="searchInput" placeholder="Search tasks..." style="width:100%;padding-left:36px !important;" oninput="renderCurrentView()">
    </div>

    <div style="flex:1;"></div>

    <!-- Filter Chips -->
    <div id="filterChips" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-chip" data-filter="urgent" onclick="setFilter('urgent')"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--urgent);margin-right:4px;"></span>Urgent</button>
      <button class="filter-chip" data-filter="high" onclick="setFilter('high')"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--high);margin-right:4px;"></span>High</button>
      <button class="filter-chip" data-filter="medium" onclick="setFilter('medium')"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--medium);margin-right:4px;"></span>Medium</button>
      <button class="filter-chip" data-filter="low" onclick="setFilter('low')"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--low);margin-right:4px;"></span>Low</button>
    </div>

    <!-- Add Task Button -->
    <button class="btn-primary" onclick="openModal()" style="display:flex;align-items:center;gap:8px;white-space:nowrap;">
      <i class="fa-solid fa-plus" style="font-size:12px;"></i> New Task
    </button>
  </header>

  <!-- View: Board -->
  <section id="boardView" style="padding:28px;">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;min-height:calc(100vh - 140px);">
      <!-- To Do -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 4px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--fg-muted);"></div>
          <h3 style="font-size:14px;font-weight:600;letter-spacing:-0.3px;">To Do</h3>
          <span id="countTodo" style="font-size:11px;color:var(--fg-muted);background:var(--bg-card);padding:2px 8px;border-radius:10px;">0</span>
        </div>
        <div class="kanban-column" id="col-todo" data-status="todo"
             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"
             style="padding:4px;display:flex;flex-direction:column;gap:10px;"></div>
      </div>
      <!-- In Progress -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 4px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--accent);"></div>
          <h3 style="font-size:14px;font-weight:600;letter-spacing:-0.3px;">In Progress</h3>
          <span id="countProgress" style="font-size:11px;color:var(--fg-muted);background:var(--bg-card);padding:2px 8px;border-radius:10px;">0</span>
        </div>
        <div class="kanban-column" id="col-progress" data-status="progress"
             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"
             style="padding:4px;display:flex;flex-direction:column;gap:10px;"></div>
      </div>
      <!-- Done -->
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:0 4px;">
          <div style="width:10px;height:10px;border-radius:50%;background:var(--success);"></div>
          <h3 style="font-size:14px;font-weight:600;letter-spacing:-0.3px;">Done</h3>
          <span id="countDone" style="font-size:11px;color:var(--fg-muted);background:var(--bg-card);padding:2px 8px;border-radius:10px;">0</span>
        </div>
        <div class="kanban-column" id="col-done" data-status="done"
             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)"
             style="padding:4px;display:flex;flex-direction:column;gap:10px;"></div>
      </div>
    </div>
  </section>

  <!-- View: List -->
  <section id="listView" style="padding:28px;display:none;">
    <div id="listContainer" style="display:flex;flex-direction:column;gap:8px;max-width:900px;"></div>
  </section>

  <!-- View: Stats -->
  <section id="statsView" style="padding:28px;display:none;">
    <h2 style="font-size:24px;font-weight:700;margin-bottom:24px;letter-spacing:-0.5px;">Statistics</h2>
    <div id="statsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px;">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--fg-muted);">Tasks by Priority</h3>
        <canvas id="priorityChart" width="300" height="220"></canvas>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:16px;color:var(--fg-muted);">Tasks by Category</h3>
        <canvas id="categoryChart" width="300" height="220"></canvas>
      </div>
    </div>
  </section>
</main>

<!-- Modal: Add/Edit Task -->
<div id="taskModal" class="modal-overlay" style="display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;">
  <div class="modal-content" style="background:var(--bg-raised);border:1px solid var(--border);border-radius:16px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto;padding:28px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h2 id="modalTitle" style="font-size:20px;font-weight:700;letter-spacing:-0.3px;">New Task</h2>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--fg-muted);cursor:pointer;font-size:18px;padding:4px;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <form id="taskForm" onsubmit="handleTaskSubmit(event)">
      <input type="hidden" id="taskId">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Task Title</label>
          <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Description</label>
          <textarea id="taskDesc" placeholder="Add details..." rows="3" style="resize:vertical;"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Category</label>
            <select id="taskCategory">
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="design">Design</option>
              <option value="development">Development</option>
              <option value="marketing">Marketing</option>
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Status</label>
            <select id="taskStatus">
              <option value="todo">To Do</option>
              <option value="progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:var(--fg-muted);display:block;margin-bottom:6px;">Due Date</label>
            <input type="date" id="taskDue">
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
          <button type="button" class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="modalSubmitBtn">Create Task</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Confirm Delete -->
<div id="deleteModal" class="modal-overlay" style="display:none;position:fixed;inset:0;z-index:110;align-items:center;justify-content:center;">
  <div class="modal-content" style="background:var(--bg-raised);border:1px solid var(--border);border-radius:16px;width:380px;max-width:90vw;padding:28px;text-align:center;">
    <div style="width:48px;height:48px;border-radius:50%;background:rgba(224,82,82,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <i class="fa-solid fa-trash" style="color:var(--danger);font-size:18px;"></i>
    </div>
    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px;">Delete Task?</h3>
    <p style="font-size:14px;color:var(--fg-muted);margin-bottom:24px;">This action cannot be undone. The task will be permanently removed.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn-ghost" onclick="closeDeleteModal()">Keep It</button>
      <button class="btn-primary" id="confirmDeleteBtn" style="background:var(--danger);">Delete</button>
    </div>
  </div>
</div>

<script>
// ── Data ──
const CATEGORIES = [
  { id: 'work', label: 'Work', color: '#e8a634', icon: 'fa-briefcase' },
  { id: 'personal', label: 'Personal', color: '#a78bfa', icon: 'fa-user' },
  { id: 'design', label: 'Design', color: '#f472b6', icon: 'fa-palette' },
  { id: 'development', label: 'Development', color: '#60b5e8', icon: 'fa-code' },
  { id: 'marketing', label: 'Marketing', color: '#4ade80', icon: 'fa-bullhorn' }
];

// Seed data for first-time visitors
const SEED_TASKS = [
  { id: genId(), title: 'Redesign landing page hero section', desc: 'Update the hero with new brand guidelines, add animated gradient background and revised copy.', priority: 'high', category: 'design', status: 'progress', due: getFutureDate(2), created: Date.now() },
  { id: genId(), title: 'Set up CI/CD pipeline for staging', desc: 'Configure GitHub Actions for automated deployment to staging environment on merge to develop branch.', priority: 'urgent', category: 'development', status: 'todo', due: getFutureDate(1), created: Date.now() },
  { id: genId(), title: 'Write Q4 marketing campaign brief', desc: 'Outline goals, target audience, channels, budget allocation, and timeline for the holiday campaign.', priority: 'medium', category: 'marketing', status: 'todo', due: getFutureDate(5), created: Date.now() },
  { id: genId(), title: 'Fix navigation accessibility issues', desc: 'Add proper ARIA labels, keyboard navigation support, and focus management for the main nav dropdowns.', priority: 'high', category: 'development', status: 'todo', due: getFutureDate(3), created: Date.now() },
  { id: genId(), title: 'Book dentist appointment', desc: 'Schedule a routine checkup. Prefer morning slots.', priority: 'low', category: 'personal', status: 'done', due: getPastDate(1), created: Date.now() },
  { id: genId(), title: 'Create component library documentation', desc: 'Document all reusable components with props, usage examples, and accessibility notes.', priority: 'medium', category: 'development', status: 'progress', due: getFutureDate(7), created: Date.now() },
  { id: genId(), title: 'Prepare weekly team standup notes', desc: 'Compile blockers, progress updates, and priorities for Monday standup.', priority: 'low', category: 'work', status: 'done', due: getPastDate(2), created: Date.now() },
  { id: genId(), title: 'Design email template for product launch', desc: 'Create a responsive HTML email template following the new brand guidelines.', priority: 'medium', category: 'design', status: 'todo', due: getFutureDate(4), created: Date.now() },
];

function genId() { return 'task_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function getFutureDate(d) { const dt = new Date(); dt.setDate(dt.getDate() + d); return dt.toISOString().split('T')[0]; }
function getPastDate(d) { const dt = new Date(); dt.setDate(dt.getDate() - d); return dt.toISOString().split('T')[0]; }

let tasks = [];
let currentView = 'board';
let currentFilter = 'all';
let draggedTaskId = null;

// ── Local Storage ──
function loadTasks() {
  const stored = localStorage.getItem('taskflow_tasks');
  if (stored) {
    try { tasks = JSON.parse(stored); } catch { tasks = [...SEED_TASKS]; }
  } else {
    tasks = [...SEED_TASKS];
  }
}
function saveTasks() {
  localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
}

// ── Toast ──
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const iconMap = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
  const colorMap = { success: 'var(--success)', error: 'var(--danger)', info: 'var(--info)' };
  toast.className = 'toast';
  toast.style.cssText = `background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,0.4);min-width:250px;`;
  toast.innerHTML = `<i class="fa-solid ${iconMap[type]}" style="color:${colorMap[type]};font-size:16px;"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.classList.add('out'); setTimeout(() => toast.remove(), 300); }, 2800);
}

// ── Views ──
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.sidebar-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
    el.style.color = el.dataset.view === view ? 'var(--accent)' : 'var(--fg-muted)';
  });
  document.getElementById('boardView').style.display = view === 'board' ? '' : 'none';
  document.getElementById('listView').style.display = view === 'list' ? '' : 'none';
  document.getElementById('statsView').style.display = view === 'stats' ? '' : 'none';
  document.getElementById('filterChips').style.display = view === 'stats' ? 'none' : 'flex';
  renderCurrentView();
}

function renderCurrentView() {
  if (currentView === 'board') renderBoard();
  else if (currentView === 'list') renderList();
  else if (currentView === 'stats') renderStats();
  updateSidebar();
  updateProgress();
}

// ── Filtering ──
function getFilteredTasks() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  return tasks.filter(t => {
    if (currentFilter !== 'all' && t.priority !== currentFilter) return false;
    if (search && !t.title.toLowerCase().includes(search) && !t.desc.toLowerCase().includes(search)) return false;
    return true;
  });
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === filter);
  });
  renderCurrentView();
}

// ── Board ──
function renderBoard() {
  const filtered = getFilteredTasks();
  const statuses = ['todo', 'progress', 'done'];
  const countEls = { todo: 'countTodo', progress: 'countProgress', done: 'countDone' };
  const colEls = { todo: 'col-todo', progress: 'col-progress', done: 'col-done' };

  statuses.forEach(status => {
    const statusTasks = filtered.filter(t => t.status === status);
    document.getElementById(countEls[status]).textContent = statusTasks.length;
    const col = document.getElementById(colEls[status]);
    if (statusTasks.length === 0) {
      col.innerHTML = `<div class="empty-state"><i class="fa-solid fa-inbox" style="font-size:28px;margin-bottom:10px;opacity:0.3;"></i><p style="font-size:13px;">No tasks here</p></div>`;
    } else {
      col.innerHTML = statusTasks.map(t => renderTaskCard(t)).join('');
    }
  });
}

function renderTaskCard(task) {
  const cat = CATEGORIES.find(c => c.id === task.category) || CATEGORIES[0];
  const dueStr = task.due ? formatDue(task.due) : '';
  const isOverdue = task.due && task.status !== 'done' && new Date(task.due) < new Date(new Date().toISOString().split('T')[0]);
  return `
    <div class="task-card" data-priority="${task.priority}" draggable="true"
         ondragstart="handleDragStart(event,'${task.id}')" ondragend="handleDragEnd(event)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <span class="priority-badge priority-${task.priority}">${task.priority}</span>
        <div style="display:flex;gap:4px;">
          <button onclick="editTask('${task.id}')" style="background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:4px;font-size:12px;border-radius:4px;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--fg-muted)'"><i class="fa-solid fa-pen"></i></button>
          <button onclick="confirmDelete('${task.id}')" style="background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:4px;font-size:12px;border-radius:4px;transition:color 0.2s;" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--fg-muted)'"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <h4 style="font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4;${task.status === 'done' ? 'text-decoration:line-through;opacity:0.6;' : ''}">${escHtml(task.title)}</h4>
      ${task.desc ? `<p style="font-size:12px;color:var(--fg-muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escHtml(task.desc)}</p>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:auto;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="category-dot cat-${task.category}"></span>
          <span style="font-size:11px;color:var(--fg-muted);">${cat.label}</span>
        </div>
        ${dueStr ? `<span style="font-size:11px;color:${isOverdue ? 'var(--danger)' : 'var(--fg-muted)'};display:flex;align-items:center;gap:4px;"><i class="fa-regular fa-calendar" style="font-size:10px;"></i>${dueStr}</span>` : ''}
      </div>
    </div>`;
}

// ── List ──
function renderList() {
  const filtered = getFilteredTasks();
  const container = document.getElementById('listContainer');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:60px 20px;"><i class="fa-solid fa-search" style="font-size:32px;margin-bottom:12px;opacity:0.3;"></i><p style="font-size:14px;">No tasks match your filters</p></div>`;
    return;
  }
  // Sort: urgent first, then by due date
  const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };
  const sorted = [...filtered].sort((a, b) => {
    if (a.status === 'done' && b.status !== 'done') return 1;
    if (a.status !== 'done' && b.status === 'done') return -1;
    if (priorityOrder[a.priority] !== priorityOrder[b.priority]) return priorityOrder[a.priority] - priorityOrder[b.priority];
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1;
    return 1;
  });

  container.innerHTML = sorted.map(t => {
    const cat = CATEGORIES.find(c => c.id === t.category) || CATEGORIES[0];
    const isDone = t.status === 'done';
    const isOverdue = t.due && !isDone && new Date(t.due) < new Date(new Date().toISOString().split('T')[0]);
    return `
      <div class="list-task" draggable="true" ondragstart="handleDragStart(event,'${t.id}')" ondragend="handleDragEnd(event)">
        <div class="custom-checkbox ${isDone ? 'checked' : ''}" onclick="toggleDone('${t.id}')">
          <i class="fa-solid fa-check"></i>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;${isDone ? 'text-decoration:line-through;opacity:0.5;' : ''}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.title)}</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
            <span class="priority-badge priority-${t.priority}" style="font-size:9px;">${t.priority}</span>
            <span style="font-size:11px;color:var(--fg-muted);display:flex;align-items:center;gap:4px;"><span class="category-dot cat-${t.category}"></span>${cat.label}</span>
            ${t.due ? `<span style="font-size:11px;color:${isOverdue ? 'var(--danger)' : 'var(--fg-muted)'};"><i class="fa-regular fa-calendar" style="font-size:9px;margin-right:3px;"></i>${formatDue(t.due)}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:4px;">
          <button onclick="editTask('${t.id}')" style="background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:6px;border-radius:6px;transition:all 0.2s;font-size:13px;" onmouseover="this.style.color='var(--accent)';this.style.background='var(--accent-glow)'" onmouseout="this.style.color='var(--fg-muted)';this.style.background='transparent'"><i class="fa-solid fa-pen"></i></button>
          <button onclick="confirmDelete('${task.id}' || '${t.id}')" style="background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:6px;border-radius:6px;transition:all 0.2s;font-size:13px;" onmouseover="this.style.color='var(--danger)';this.style.background='rgba(224,82,82,0.1)'" onmouseout="this.style.color='var(--fg-muted)';this.style.background='transparent'"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>`;
  }).join('');
}

function toggleDone(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.status = task.status === 'done' ? 'todo' : 'done';
  saveTasks();
  renderCurrentView();
  showToast(task.status === 'done' ? 'Task completed!' : 'Task reopened', task.status === 'done' ? 'success' : 'info');
}

// ── Drag & Drop ──
function handleDragStart(e, id) {
  draggedTaskId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
  draggedTaskId = null;
}
function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function handleDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const newStatus = e.currentTarget.dataset.status;
  if (!draggedTaskId || !newStatus) return;
  const task = tasks.find(t => t.id === draggedTaskId);
  if (task && task.status !== newStatus) {
    task.status = newStatus;
    saveTasks();
    renderCurrentView();
    const statusLabels = { todo: 'To Do', progress: 'In Progress', done: 'Done' };
    showToast(`Moved to ${statusLabels[newStatus]}`, 'info');
  }
}

// ── Stats ──
function renderStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const todo = tasks.filter(t => t.status === 'todo').length;
  const progress = tasks.filter(t => t.status === 'progress').length;
  const overdue = tasks.filter(t => t.due && t.status !== 'done' && new Date(t.due) < new Date(new Date().toISOString().split('T')[0])).length;
  const urgent = tasks.filter(t => t.priority === 'urgent' && t.status !== 'done').length;

  const stats = [
    { label: 'Total Tasks', value: total, icon: 'fa-layer-group', color: 'var(--fg)' },
    { label: 'Completed', value: done, icon: 'fa-circle-check', color: 'var(--success)' },
    { label: 'In Progress', value: progress, icon: 'fa-spinner', color: 'var(--accent)' },
    { label: 'To Do', value: todo, icon: 'fa-clock', color: 'var(--fg-muted)' },
    { label: 'Overdue', value: overdue, icon: 'fa-exclamation-triangle', color: 'var(--danger)' },
    { label: 'Urgent', value: urgent, icon: 'fa-fire', color: 'var(--urgent)' },
  ];

  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:40px;height:40px;border-radius:10px;background:${s.color}15;display:flex;align-items:center;justify-content:center;">
          <i class="fa-solid ${s.icon}" style="color:${s.color};font-size:16px;"></i>
        </div>
        <div>
          <div style="font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif;">${s.value}</div>
          <div style="font-size:12px;color:var(--fg-muted);">${s.label}</div>
        </div>
      </div>
    </div>`).join('');

  drawPriorityChart();
  drawCategoryChart();
}

function drawPriorityChart() {
  const canvas = document.getElementById('priorityChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  const priorities = ['urgent', 'high', 'medium', 'low'];
  const colors = ['#ff6b6b', '#e8a634', '#60b5e8', '#4ade80'];
  const counts = priorities.map(p => tasks.filter(t => t.priority === p).length);
  const maxVal = Math.max(...counts, 1);
  const barWidth = 36;
  const gap = (w - priorities.length * barWidth) / (priorities.length + 1);
  const chartH = h - 40;

  counts.forEach((count, i) => {
    const x = gap + i * (barWidth + gap);
    const barH = (count / maxVal) * (chartH - 20);
    const y = chartH - barH;

    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.roundRect(x, 20, barWidth, chartH - 20, 6);
    ctx.fill();

    // Bar fill
    ctx.fillStyle = colors[i];
    ctx.beginPath();
    ctx.roundRect(x, y, barWidth, barH, 6);
    ctx.fill();

    // Count
    ctx.fillStyle = '#f0ece4';
    ctx.font = '600 13px "Space Grotesk"';
    ctx.textAlign = 'center';
    ctx.fillText(count, x + barWidth / 2, y - 8);

    // Label
    ctx.fillStyle = '#8a8778';
    ctx.font = '500 11px "DM Sans"';
    ctx.fillText(priorities[i].charAt(0).toUpperCase() + priorities[i].slice(1), x + barWidth / 2, h - 8);
  });
}

function drawCategoryChart() {
  const canvas = document.getElementById('categoryChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  ctx.clearRect(0, 0, w, h);

  const counts = CATEGORIES.map(c => tasks.filter(t => t.category === c.id).length);
  const total = counts.reduce((a, b) => a + b, 0) || 1;
  const cx = w / 2, cy = h / 2 - 10;
  const outerR = Math.min(w, h) / 2 - 30;
  const innerR = outerR * 0.55;

  let startAngle = -Math.PI / 2;
  counts.forEach((count, i) => {
    const slice = (count / total) * Math.PI * 2;
    if (count === 0) { startAngle += slice; return; }
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, startAngle, startAngle + slice);
    ctx.arc(cx, cy, innerR, startAngle + slice, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = CATEGORIES[i].color;
    ctx.fill();
    startAngle += slice;
  });

  // Center text
  ctx.fillStyle = '#f0ece4';
  ctx.font = '700 22px "Space Grotesk"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 6);
  ctx.fillStyle = '#8a8778';
  ctx.font = '400 11px "DM Sans"';
  ctx.fillText('total tasks', cx, cy + 14);

  // Legend
  const legendY = h - 12;
  const legendWidth = CATEGORIES.length * 70;
  const legendStart = (w - legendWidth) / 2;
  CATEGORIES.forEach((cat, i) => {
    const x = legendStart + i * 70 + 10;
    ctx.fillStyle = cat.color;
    ctx.beginPath();
    ctx.arc(x, legendY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8a8778';
    ctx.font = '400 10px "DM Sans"';
    ctx.textAlign = 'left';
    ctx.fillText(cat.label, x + 8, legendY + 3);
  });
}

// ── Sidebar ──
function updateSidebar() {
  const container = document.getElementById('sidebarCategories');
  container.innerHTML = CATEGORIES.map(cat => {
    const count = tasks.filter(t => t.category === cat.id && t.status !== 'done').length;
    return `
      <div style="padding:8px 16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--fg-muted);cursor:default;">
        <span class="category-dot cat-${cat.id}"></span>
        <span style="flex:1;">${cat.label}</span>
        <span style="font-size:11px;opacity:0.6;">${count}</span>
      </div>`;
  }).join('');
}

function updateProgress() {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} of ${total} completed`;
}

// ── Modal ──
function openModal(taskId = null) {
  const modal = document.getElementById('taskModal');
  const form = document.getElementById('taskForm');
  form.reset();
  document.getElementById('taskId').value = '';

  if (taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    document.getElementById('modalTitle').textContent = 'Edit Task';
    document.getElementById('modalSubmitBtn').textContent = 'Save Changes';
    document.getElementById('taskId').value = task.id;
    document.getElementById('taskTitle').value = task.title;
    document.getElementById('taskDesc').value = task.desc;
    document.getElementById('taskPriority').value = task.priority;
    document.getElementById('taskCategory').value = task.category;
    document.getElementById('taskStatus').value = task.status;
    document.getElementById('taskDue').value = task.due || '';
  } else {
    document.getElementById('modalTitle').textContent = 'New Task';
    document.getElementById('modalSubmitBtn').textContent = 'Create Task';
  }

  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('taskModal').style.display = 'none';
}

function handleTaskSubmit(e) {
  e.preventDefault();
  const id = document.getElementById('taskId').value;
  const data = {
    title: document.getElementById('taskTitle').value.trim(),
    desc: document.getElementById('taskDesc').value.trim(),
    priority: document.getElementById('taskPriority').value,
    category: document.getElementById('taskCategory').value,
    status: document.getElementById('taskStatus').value,
    due: document.getElementById('taskDue').value || null,
  };

  if (!data.title) return;

  if (id) {
    const task = tasks.find(t => t.id === id);
    if (task) Object.assign(task, data);
    showToast('Task updated successfully', 'success');
  } else {
    tasks.push({ id: genId(), ...data, created: Date.now() });
    showToast('Task created successfully', 'success');
  }

  saveTasks();
  closeModal();
  renderCurrentView();
}

function editTask(id) {
  openModal(id);
}

// ── Delete ──
let pendingDeleteId = null;
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('deleteModal').style.display = 'flex';
}
function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('deleteModal').style.display = 'none';
}
document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
  if (pendingDeleteId) {
    tasks = tasks.filter(t => t.id !== pendingDeleteId);
    saveTasks();
    renderCurrentView();
    showToast('Task deleted', 'error');
  }
  closeDeleteModal();
});

// ── Helpers ──
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDue(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < -1) return `${Math.abs(diff)}d overdue`;
  if (diff <= 7) return `In ${diff}d`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Close modals on overlay click ──
document.getElementById('taskModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDeleteModal();
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeDeleteModal();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    openModal();
  }
});

// ── Init ──
loadTasks();
renderCurrentView();
</script>
